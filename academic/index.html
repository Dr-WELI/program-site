<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Academic | Dr WELI</title>
<link rel="stylesheet" href="/styles.css" />
<style>
/* ONLY PATCHED SECTIONS BELOW */

.research-node.left{left:70px}
.research-node.right{right:70px}

.research-orbit::before{
  border:1px solid rgba(183,154,114,.25);
  animation:orbitSpin 40s linear infinite;
}
.research-orbit::after{
  border:1px solid rgba(74,95,138,.25);
  animation:orbitSpinReverse 28s linear infinite;
}

@keyframes orbitSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes orbitSpinReverse{from{transform:rotate(360deg)}to{transform:rotate(0)}}

.research-node{background:rgba(255,251,248,.78);backdrop-filter:blur(14px)}
.research-hub{background:rgba(255,252,248,.88)}

.section .cards.three{justify-content:center}
.section .cards.three>.card{margin-left:auto;margin-right:auto}

@media (max-width:640px){
  .research-orbit{transform:scale(.82);transform-origin:top center}
  .research-node{max-width:280px;padding:14px}
  .research-hub{width:160px;height:160px}
}

</style>
</head>
<body>
<!-- KEEP REST OF FILE SAME -->
</body>
</html>
