<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Academic | Dr WELI</title>
  <meta name="description" content="Research, facilitation, teaching, publications, and talks by Dr Weliton Menário Costa" />
  <meta name="author" content="Dr Weliton Menário Costa (WELI)" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />

  <style>

    /* ---------- HERO ---------- */
    .academic-hero{position:relative;overflow:hidden;isolation:isolate}
    .academic-hero .hero-inner{position:relative;z-index:2;padding-right:72px}

    .academic-signal{position:absolute;top:34px;right:18px;bottom:34px;width:44px;overflow:hidden;pointer-events:none;z-index:1;opacity:.82}
    .academic-signal-track{position:absolute;top:0;right:0;display:flex;flex-direction:column;gap:18px;animation:academicSignalMove 26s linear infinite}
    .academic-signal-item{writing-mode:vertical-rl;text-orientation:mixed;font-size:.67rem;letter-spacing:.17em;text-transform:uppercase;color:rgba(23,23,23,.62);white-space:nowrap}

    .academic-signal::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(234,228,220,1) 0%, rgba(234,228,220,0) 10%, rgba(234,228,220,0) 90%, rgba(234,228,220,1) 100%);
      pointer-events:none;
      z-index:2;
    }

    @keyframes academicSignalMove{from{transform:translateY(-4%)}to{transform:translateY(-52%)}}


    /* ---------- RESEARCH DIAGRAM (FIXED) ---------- */

    .research-orbit{
      position:relative;
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:32px auto 0;
    }

    .research-orbit::before{
      content:"";
      position:absolute;
      width:320px;
      height:320px;
      border:1px dashed rgba(23,23,23,.08);
      border-radius:50%;
    }

    .research-hub{
      width:160px;
      height:160px;
      padding:18px;
      border-radius:50%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:linear-gradient(180deg, rgba(255,252,248,.94) 0%, rgba(240,233,225,.96) 100%);
      border:1px solid rgba(23,23,23,.10);
      box-shadow:0 12px 30px rgba(23,23,23,.08);
    }

    .research-hub a{font-size:1.05rem;font-weight:800;text-decoration:none;color:var(--text)}
    .research-hub span{font-size:.7rem;letter-spacing:.10em;text-transform:uppercase;color:var(--muted)}

    .research-node{
      position:absolute;
      width:200px;
      min-height:140px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,251,248,.78);
      border:1px solid rgba(23,23,23,.08);
      box-shadow:var(--shadow-soft);
    }

    .research-node h3{font-size:.95rem;margin-bottom:6px}
    .research-node p{font-size:.85rem;line-height:1.45;color:var(--muted)}

    .research-node.top{top:0;left:50%;transform:translateX(-50%)}
    .research-node.left{left:40px;bottom:60px}
    .research-node.right{right:40px;bottom:60px}

    .research-node::after{display:none}

    .research-node:hover,.research-hub:hover{transform:translateY(-2px);transition:.25s ease}


    /* ---------- APPOINTMENTS (TIGHTER) ---------- */

    .appointments-wrap{max-width:1000px;margin:0 auto}
    .appointments-row{gap:14px}
    .appointment-card{padding:18px}
    .appointment-card p{font-size:.92rem;line-height:1.5}


    /* ---------- MOBILE ---------- */

    @media (max-width:768px){

      .research-orbit{
        display:flex;
        flex-direction:column;
        gap:16px;
        min-height:auto;
      }

      .research-orbit::before{display:none}

      .research-node,
      .research-hub{
        position:relative;
        width:100%;
        max-width:320px;
        margin:0 auto;
        transform:none;
      }

    }

    @media (max-width:900px){
      .academic-signal{display:none}
      .academic-hero .hero-inner{padding-right:0}
    }

  </style>

</head>
<body>

<!-- KEEP BODY SAME -->

</body>
</html>
